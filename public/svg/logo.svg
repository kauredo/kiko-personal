<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <!-- V4A: Chord Diagram — F chord shape on left, C chord shape on right, sharing the same fretboard -->
  <!-- The 6 strings run vertically. Horizontal fret lines. Dots show finger positions. -->

  <!-- 6 strings -->
  <line x1="48" y1="32" x2="48" y2="208" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>
  <line x1="72" y1="32" x2="72" y2="208" stroke="currentColor" stroke-width="1.2" opacity="0.15"/>
  <line x1="96" y1="32" x2="96" y2="208" stroke="currentColor" stroke-width="1" opacity="0.15"/>
  <line x1="144" y1="32" x2="144" y2="208" stroke="currentColor" stroke-width="1" opacity="0.15"/>
  <line x1="168" y1="32" x2="168" y2="208" stroke="currentColor" stroke-width="1.2" opacity="0.15"/>
  <line x1="192" y1="32" x2="192" y2="208" stroke="currentColor" stroke-width="1.5" opacity="0.15"/>

  <!-- Fret lines (horizontal) -->
  <line x1="36" y1="68" x2="204" y2="68" stroke="currentColor" stroke-width="0.5" opacity="0.10"/>
  <line x1="36" y1="104" x2="204" y2="104" stroke="currentColor" stroke-width="0.5" opacity="0.10"/>
  <line x1="36" y1="140" x2="204" y2="140" stroke="currentColor" stroke-width="0.5" opacity="0.10"/>
  <line x1="36" y1="176" x2="204" y2="176" stroke="currentColor" stroke-width="0.5" opacity="0.10"/>

  <!-- Nut (top thick line) -->
  <line x1="36" y1="32" x2="204" y2="32" stroke="currentColor" stroke-width="3" opacity="0.25"/>

  <!-- F chord dots (F barre chord, 1st position): -->
  <!-- Barre across all strings at fret 1 -->
  <rect x="42" y="40" width="156" height="18" rx="9" fill="currentColor" opacity="0.08"/>
  <!-- Index finger barre indicator -->
  <circle cx="48" cy="50" r="5" fill="currentColor" opacity="0.5"/>
  <circle cx="192" cy="50" r="5" fill="currentColor" opacity="0.5"/>
  <!-- 3rd string, 2nd fret (A) -->
  <circle cx="96" cy="86" r="6" fill="currentColor" opacity="0.6"/>
  <!-- 4th string, 3rd fret (F) -->
  <circle cx="144" cy="122" r="6" fill="currentColor" opacity="0.6"/>
  <!-- 5th string, 3rd fret (C) -->
  <circle cx="168" cy="122" r="6" fill="currentColor" opacity="0.6"/>

  <!-- F label -->
  <text x="48" y="26" font-family="Georgia, serif" font-size="14" fill="currentColor" opacity="0.5" text-anchor="middle" font-weight="700">F</text>

  <!-- C chord dots (open C chord): shown in lower frets -->
  <!-- 2nd string, 1st fret (C) -->
  <circle cx="72" cy="158" r="6" fill="currentColor" opacity="0.6"/>
  <!-- 4th string, 2nd fret (E) -->
  <circle cx="144" cy="158" r="6" fill="currentColor" opacity="0.6"/>
  <!-- 5th string, 3rd fret (C) -->
  <circle cx="168" cy="194" r="6" fill="currentColor" opacity="0.6"/>

  <!-- C label -->
  <text x="192" y="26" font-family="Georgia, serif" font-size="14" fill="currentColor" opacity="0.5" text-anchor="middle" font-weight="700">C</text>

  <!-- Open string indicators (small circles at top) -->
  <circle cx="72" cy="24" r="3" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.3"/>
  <circle cx="96" cy="24" r="3" stroke="currentColor" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>
